name: Trigger auto deployment for ca-ocd-uat-za

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/ca-ocd-uat-za-AutoDeployTrigger-8a468ef4-785a-4594-be74-00edb7ab4577.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CAOCDUATZA_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CAOCDUATZA_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CAOCDUATZA_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.CAOCDUATZA_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CAOCDUATZA_REGISTRY_PASSWORD }}
          containerAppName: ca-ocd-uat-za
          resourceGroup: rg-ocd-uat-za
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


